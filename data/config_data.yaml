# Plan Abschn. 3: Drei klar getrennte Pretrain-Stages (IMU-1-Style)
# Stage 1 = The Stack v2 + Stack-Edu moderat; Stage 2 = Stack-Edu stark + CODA/CodeDenoise;
# Stage 3 = Docstring→Code→Tests, Execution-Filter (phi-1-Style)

stages:
  stage1:
    name: breit_okay
    description: "The Stack v2 + Stack-Edu, moderat gefiltert"
    filters:
      min_chars: 100
      max_chars: 100000
      license_allow: []
      near_dedup: true
      dedup_threshold: 0.95
  stage2:
    name: sauber_edukativ
    description: "Stack-Edu stark + Tests + DS-1000-ähnlich; CODA, CodeDenoise"
    filters:
      min_chars: 100
      max_chars: 100000
      near_dedup: true
      dedup_threshold: 0.98
      classifier_quality: false
  stage3:
    name: curriculum_instruktion
    description: "Docstring→Code→Tests, Execution-Filter"
    filters:
      min_chars: 50
      max_chars: 50000
      near_dedup: true
      execution_filter: true

# 1. Pipeline Definitions for the 3-Stage approach
data_pipeline:
  stage_1_mix:
    sources:
      - name: "bigcode/the-stack-v2-train-smol-ids"
        weight: 0.3
      - name: "bigcode/the-stack-edu"
        weight: 0.7
    filters:
      max_length: 32000
      near_dedup: true
      
  # Stage 2: Cleaned Stack-Edu + High-Quality Instruct
  stage_2_mix:
    sources:
      - name: "bigcode/the-stack-edu-filtered"
        weight: 0.7
      - name: "HuggingFaceH4/CodeAlpaca_20K"
        weight: 0.3
    filters:
      max_length: 16000
      near_dedup: true
      
  # Stage 3: Extreme Quality Execution-Verified & Contests
  stage_3_mix:
    sources:
      - name: "deepmind/code_contests"
        weight: 0.6
      - name: "m-a-p/CodeFeedback-Filtered-Instruction"
        weight: 0.4
    filters:
      execution_filter: "all_tests_green"

# 2. Static Stage Mix overrides (No RegMIX proxy, Plan §3.2)
static_mix_schedule:
  stage1: "stage_1_mix"
  stage2: "stage_2_mix"
  stage3: "stage_3_mix"
